[pytest]
# ── Python path ────────────────────────────────────────────────────
# Adds project root to sys.path so imports like:
#   from resources.api.api_client import ApiClient
#   from config.env_config import get_env_config
# resolve correctly. Requires pytest >= 7.0
pythonpath = .

# ── Test discovery ─────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Default options ────────────────────────────────────────────────
# NOTE: --alluredir and --clean-alluredir are NOT here.
# They are passed explicitly in run_tests.bat or on the CLI:
#   pytest --alluredir=results/allure --clean-alluredir -m smoke
#
# Reason: --clean-alluredir causes a startup crash if allure-pytest
# is not installed yet or is not fully initialised before pytest
# reads pytest.ini addopts. Passing it on the CLI avoids this.
addopts = -v --tb=short
    --html=results/report.html
    --self-contained-html

# ── Markers ────────────────────────────────────────────────────────
markers =
    smoke: Critical path – run before every deployment
    regression: Full regression suite – run nightly
    auth: Authentication flow tests
    health: API endpoint health checks
    integrity: UI + API cross-validation tests
    performance: Response time assertions
    P1: Highest priority
    P2: Medium priority
    P3: Low priority

# ── Logging ────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO

# ── Warnings ───────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::urllib3.exceptions.InsecureRequestWarning
