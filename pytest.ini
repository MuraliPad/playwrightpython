[pytest]
# ── Python path ────────────────────────────────────────────────────
# Adds project root to sys.path so imports like:
#   from resources.api.api_client import ApiClient
#   from config.env_config import get_env_config
# resolve correctly. Requires pytest >= 7.0
pythonpath = .

# ── Test discovery ─────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Default options ────────────────────────────────────────────────
# Every pytest run automatically:
#   1. Collects Allure JSON into results/allure/
#   2. Generates HTML report via pytest_sessionfinish hook in conftest.py
#   3. Generates pytest-html report at results/report.html
#
# NOTE: --alluredir here is safe because allure-pytest registers it
# before pytest.ini addopts are parsed (as of allure-pytest >= 2.9)
addopts = -v --tb=short --alluredir=results/allure --clean-alluredir --html=results/report.html --self-contained-html

# ── Markers ────────────────────────────────────────────────────────
markers =
    smoke: Critical path – run before every deployment
    regression: Full regression suite – run nightly
    auth: Authentication flow tests
    health: API endpoint health checks
    integrity: UI + API cross-validation tests
    performance: Response time assertions
    P1: Highest priority
    P2: Medium priority
    P3: Low priority

# ── Logging ────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO

# ── Warnings ───────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::urllib3.exceptions.InsecureRequestWarning
