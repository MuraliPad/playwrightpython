[pytest]
# ── Test discovery ─────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Allure results directory ───────────────────────────────────────
addopts =
    --alluredir=results/allure
    --clean-alluredir
    -v

# ── Markers ────────────────────────────────────────────────────────
markers =
    smoke:       Critical path tests – run before every deployment
    regression:  Full regression suite – run nightly
    auth:        Authentication flow tests
    health:      API endpoint health checks
    integrity:   UI + API cross-validation tests
    performance: Response time assertions
    P1:          Highest priority
    P2:          Medium priority
    P3:          Low priority / edge cases

# ── Output ─────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
